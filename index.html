<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Batman Jump - Fixed Edition</title>
    <style>
        body { text-align: center; background: #000; color: white; font-family: 'Arial', sans-serif; margin: 0; overflow: hidden; touch-action: none; }
        #gameContainer { width: 100vw; height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; position: relative; }
        canvas { background: #1a1a1a; border-top: 4px solid #f1c40f; border-bottom: 4px solid #f1c40f; width: 100%; max-width: 600px; }
        .ui-text { position: absolute; text-align: center; width: 100%; pointer-events: none; z-index: 10; }
        #liveScore { top: 20px; color: #f1c40f; font-weight: bold; font-size: 22px; }
        #instruction { bottom: 20px; color: #aaa; font-size: 14px; }
        .overlay { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(0,0,0,0.8); padding: 20px; border-radius: 10px; border: 2px solid #f1c40f; }
        h1 { color: #f1c40f; margin: 0 0 10px 0; }
        p { margin: 5px 0; }
    </style>
</head>
<body>
    <div id="gameContainer">
        <div id="liveScore" class="ui-text">SCORE: 0 | BEST: 0</div>
        <canvas id="gameCanvas" width="600" height="250"></canvas>
        <div id="instruction" class="ui-text">SPACE / TOUCH = JUMP</div>

        <div id="startScreen" class="overlay">
            <h1>BATMAN JUMP</h1>
            <p>PRESS SPACE TO START</p>
        </div>

        <div id="gameOverScreen" class="overlay" style="display: none;">
            <h1>GOTHAM FELL!</h1>
            <p id="finalScore"></p>
            <p style="color: #f1c40f; font-weight: bold;">PRESS SPACE TO RETRY</p>
        </div>
    </div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const scoreDisplay = document.getElementById("liveScore");
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        let gameActive = false;
        let isGameOver = false;
        let score = 0;
        let highScore = localStorage.getItem("batmanHighScore") || 0;
        
        const batmanImg = new Image();
        batmanImg.src = 'https://img.icons8.com/color/96/batman.png';

        let player = { x: 50, y: 180, w: 50, h: 50, dy: 0, jump: -11, ground: 180, jumping: false };
        let obstacle = { x: 650, y: 200, w: 30, h: 30, speed: 5 };
        let buildings = [];

        function initBuildings() {
            buildings = [];
            for(let i=0; i<800; i+=80) {
                buildings.push({x: i, h: 50 + Math.random() * 100, light: Math.random() < 0.3});
            }
        }

        function playSound(freq, type, duration) {
            try {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = type;
                osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
                gain.gain.setValueAtTime(0.05, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
                osc.connect(gain); gain.connect(audioCtx.destination);
                osc.start(); osc.stop(audioCtx.currentTime + duration);
            } catch(e) {}
        }

        function handleAction() {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            
            if (!gameActive && !isGameOver) {
                // Start Game
                document.getElementById("startScreen").style.display = "none";
                gameActive = true;
                initBuildings();
                requestAnimationFrame(draw);
            } else if (isGameOver) {
                // Reset Game
                score = 0;
                obstacle.x = 650;
                obstacle.speed = 5;
                player.y = player.ground;
                isGameOver = false;
                document.getElementById("gameOverScreen").style.display = "none";
                scoreDisplay.innerHTML = `SCORE: 0 | BEST: ${highScore}`;
                requestAnimationFrame(draw);
            } else if (gameActive && !player.jumping) {
                // Jump
                player.dy = player.jump;
                player.jumping = true;
                playSound(500, "sine", 0.1);
            }
        }

        function draw() {
            if (isGameOver || !gameActive) return;

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Buildings
            buildings.forEach(b => {
                ctx.fillStyle = "#111";
                ctx.fillRect(b.x, 240 - b.h, 60, b.h);
                if(b.light) {
                    ctx.fillStyle = "#f1c40f";
                    ctx.fillRect(b.x + 25, 240 - b.h + 15, 8, 8);
                }
            });

            ctx.fillStyle = "#f1c40f";
            ctx.fillRect(0, 240, 600, 10);

            ctx.drawImage(batmanImg, player.x, player.y, player.w, player.h);
            
            ctx.fillStyle = "black";
            ctx.fillRect(obstacle.x, obstacle.y, obstacle.w, obstacle.h);
            ctx.strokeStyle = "white";
            ctx.strokeRect(obstacle.x, obstacle.y, obstacle.w, obstacle.h);

            player.y += player.dy;
            if (player.y < player.ground) player.dy += 0.6;
            else { player.y = player.ground; player.dy = 0; player.jumping = false; }

            obstacle.x -= obstacle.speed;
            if (obstacle.x < -30) {
                obstacle.x = 650;
                score++;
                obstacle.speed += 0.2;
                if (score > highScore) {
                    highScore = score;
                    localStorage.setItem("batmanHighScore", highScore);
                }
                scoreDisplay.innerHTML = `SCORE: ${score} | BEST: ${highScore}`;
            }

            if (player.x < obstacle.x + obstacle.w && player.x + player.w > obstacle.x &&
                player.y < obstacle.y + obstacle.h && player.y + player.h > obstacle.y) {
                isGameOver = true;
                playSound(150, "square", 0.3);
                document.getElementById("finalScore").innerText = "YOUR SCORE: " + score;
                document.getElementById("gameOverScreen").style.display = "block";
            } else {
                requestAnimationFrame(draw);
            }
        }

        window.addEventListener("keydown", (e) => { if (e.code === "Space") { e.preventDefault(); handleAction(); } });
        window.addEventListener("touchstart", (e) => { e.preventDefault(); handleAction(); }, {passive: false});

        scoreDisplay.innerHTML = `SCORE: 0 | BEST: ${highScore}`;
    </script>
</body>
</html>
