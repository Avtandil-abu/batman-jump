<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Batman Jump - Final Gotham</title>
    <style>
        body { text-align: center; background: #0b1115; color: white; font-family: 'Arial', sans-serif; margin: 0; overflow: hidden; touch-action: none; }
        #gameContainer { width: 100vw; height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        canvas { background: #1a2530; border-top: 4px solid #f1c40f; border-bottom: 4px solid #f1c40f; width: 100%; height: auto; }
        h1 { color: #f1c40f; margin: 5px 0; font-size: 24px; text-shadow: 2px 2px #000; }
        .score-box { color: #f1c40f; font-weight: bold; font-size: 22px; margin-bottom: 10px; }
        .info-text { font-size: 12px; color: #bdc3c7; margin-top: 5px; }
    </style>
</head>
<body>
    <div id="gameContainer">
        <h1 id="titleText">BATMAN JUMP</h1>
        <div class="score-box" id="liveScore">LOADING...</div>
        <canvas id="gameCanvas" width="600" height="250"></canvas>
        <p class="info-text" id="helpText">TAP TO JUMP</p>
    </div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const scoreDisplay = document.getElementById("liveScore");
        const helpText = document.getElementById("helpText");

        const userLang = navigator.language || navigator.userLanguage;
        const isGeorgian = userLang.includes('ka');
        let highScore = localStorage.getItem("batmanHighScore") || 0;

        const texts = {
            score: isGeorgian ? "ქულა: " : "SCORE: ",
            best: isGeorgian ? "რეკორდი: " : "BEST: ",
            gameOver: isGeorgian ? "გოთემი დაეცა!" : "GOTHAM FELL!",
            restart: isGeorgian ? "დასაწყებად შეეხე ეკრანს" : "TAP TO RESTART",
            help: isGeorgian ? "შეხება = ნახტომი" : "TAP TO JUMP"
        };

        helpText.innerText = texts.help;
        scoreDisplay.innerHTML = `${texts.score} 0 | ${texts.best} ${highScore}`;

        const batmanImg = new Image();
        batmanImg.src = 'https://img.icons8.com/color/96/batman.png';

        let player = { x: 50, y: 180, w: 50, h: 50, dy: 0, jump: -12, ground: 180, jumping: false };
        let obstacle = { x: 600, y: 200, w: 30, h: 30, speed: 5 };
        let score = 0;
        let isGameOver = false;

        // **წინასწარ ვქმნით ქალაქის შენობებს Random სიმაღლეებით**
        let buildings = [];
        for(let i=0; i<600; i+=80) {
            let h = 80 + Math.random() * 100; // სიმაღლე 80-დან 180-მდე
            buildings.push({x: i, h: h});
        }

        function draw() {
            if (isGameOver) {
                ctx.fillStyle = "rgba(0,0,0,0.85)";
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = "#f1c40f";
                ctx.font = "bold 30px Arial";
                ctx.fillText(texts.gameOver, 200, 100);
                ctx.fillStyle = "white";
                ctx.font = "22px Arial";
                ctx.fillText(texts.score + score, 230, 140);
                ctx.font = "16px Arial";
                ctx.fillText(texts.restart, 200, 180);
                return;
            }

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // **ქალაქის ხატვა (შენობები + scattered windows)**
            ctx.fillStyle = "#2c3e50"; // შენობების ფერი
            buildings.forEach((b) => {
                ctx.fillRect(b.x, 240 - b.h, 60, b.h); 
                
                // ფანჯრების ხატვა ( scattered, not all on)
                for(let row=0; row < b.h-30; row+=20) {
                    // **ეს ლოგიკა random-ად რთავს შუქს**
                    if(Math.random() < 0.3) { ctx.fillStyle = "#f1c40f"; ctx.fillRect(b.x+15, 240-b.h+row+20, 6, 6); ctx.fillStyle = "#2c3e50"; }
                    if(Math.random() < 0.3) { ctx.fillStyle = "#f1c40f"; ctx.fillRect(b.x+40, 240-b.h+row+20, 6, 6); ctx.fillStyle = "#2c3e50"; }
                }
            });

            // მიწა
            ctx.strokeStyle = "#f1c40f";
            ctx.lineWidth = 5;
            ctx.beginPath(); ctx.moveTo(0, 240); ctx.lineTo(600, 240); ctx.stroke();

            // პერსონაჟი და დაბრკოლება
            ctx.drawImage(batmanImg, player.x, player.y, player.w, player.h);
            ctx.fillStyle = "#000";
            ctx.fillRect(obstacle.x, obstacle.y, obstacle.w, obstacle.h);

            // ლოგიკა
            player.y += player.dy;
            if (player.y < player.ground) player.dy += 0.6;
            else { player.y = player.ground; player.dy = 0; player.jumping = false; }

            obstacle.x -= obstacle.speed;
            if (obstacle.x < -30) { 
                obstacle.x = 600; 
                score++; 
                obstacle.speed += 0.25; 
                if (score > highScore) {
                    highScore = score;
                    localStorage.setItem("batmanHighScore", highScore);
                }
                scoreDisplay.innerHTML = `${texts.score}${score} | ${texts.best}${highScore}`;
            }

            if (player.x < obstacle.x + obstacle.w && player.x + player.w > obstacle.x &&
                player.y < obstacle.y + obstacle.h && player.y + player.h > obstacle.y) {
                isGameOver = true;
            }
            requestAnimationFrame(draw);
        }

        function handleInput(e) {
            if (e && e.type === "touchstart") e.preventDefault();
            if (!player.jumping && !isGameOver) {
                player.dy = player.jump;
                player.jumping = true;
            } else if (isGameOver) {
                location.reload();
            }
        }

        document.body.addEventListener("touchstart", handleInput, { passive: false });
        window.addEventListener("keydown", (e) => { if (e.code === "Space") handleInput(); });

        draw();
    </script>
</body>
</html>
