<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Batman Jump - Final Edition</title>
    <style>
        body { text-align: center; background: #000; color: white; font-family: 'Arial', sans-serif; margin: 0; overflow: hidden; touch-action: none; }
        #gameContainer { width: 100vw; height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; position: relative; }
        canvas { background: #1a1a1a; border-top: 4px solid #f1c40f; border-bottom: 4px solid #f1c40f; width: 100%; max-width: 600px; height: auto; }
        .ui-layer { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; pointer-events: none; }
        .score-box { color: #f1c40f; font-weight: bold; font-size: 22px; margin-bottom: 10px; }
        .btn { background: #f1c40f; color: black; border: none; padding: 15px 30px; font-size: 20px; font-weight: bold; cursor: pointer; pointer-events: auto; border-radius: 5px; margin-top: 10px; }
        h1 { color: #f1c40f; text-shadow: 2px 2px #000; margin-bottom: 10px; }
    </style>
</head>
<body>
    <div id="gameContainer">
        <div class="score-box" id="liveScore">SCORE: 0 | BEST: 0</div>
        <canvas id="gameCanvas" width="600" height="250"></canvas>
        
        <div id="startScreen" class="ui-layer">
            <h1>BATMAN JUMP</h1>
            <button class="btn" onclick="startGame()">START GAME</button>
        </div>

        <div id="gameOverScreen" class="ui-layer" style="display: none;">
            <h1 id="statusText">GOTHAM FELL!</h1>
            <button class="btn" onclick="resetGame()">RETRY</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const scoreDisplay = document.getElementById("liveScore");
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        let gameActive = false;
        let isGameOver = false;
        let score = 0;
        let highScore = localStorage.getItem("batmanHighScore") || 0;
        
        const batmanImg = new Image();
        batmanImg.src = 'https://img.icons8.com/color/96/batman.png';

        let player = { x: 50, y: 180, w: 50, h: 50, dy: 0, jump: -11, ground: 180, jumping: false };
        let obstacle = { x: 650, y: 200, w: 30, h: 30, speed: 5 };
        let buildings = [];

        function initBuildings() {
            buildings = [];
            for(let i=0; i<800; i+=80) {
                buildings.push({x: i, h: 50 + Math.random() * 100, light: Math.random() < 0.3});
            }
        }

        function playSound(freq, type, duration) {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = type;
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + duration);
        }

        function startGame() {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            document.getElementById("startScreen").style.display = "none";
            gameActive = true;
            initBuildings();
            draw();
        }

        function resetGame() {
            score = 0;
            obstacle.x = 650;
            obstacle.speed = 5;
            player.y = player.ground;
            isGameOver = false;
            document.getElementById("gameOverScreen").style.display = "none";
            requestAnimationFrame(draw);
        }

        function draw() {
            if (isGameOver || !gameActive) return;

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Buildings
            buildings.forEach(b => {
                ctx.fillStyle = "#111";
                ctx.fillRect(b.x, 240 - b.h, 60, b.h);
                if(b.light) {
                    ctx.fillStyle = "#f1c40f";
                    ctx.fillRect(b.x + 25, 240 - b.h + 15, 8, 8);
                }
            });

            // Ground
            ctx.fillStyle = "#f1c40f";
            ctx.fillRect(0, 240, 600, 10);

            // Batman & Obstacle
            ctx.drawImage(batmanImg, player.x, player.y, player.w, player.h);
            ctx.fillStyle = "black";
            ctx.fillRect(obstacle.x, obstacle.y, obstacle.w, obstacle.h);
            ctx.strokeStyle = "white";
            ctx.strokeRect(obstacle.x, obstacle.y, obstacle.w, obstacle.h);

            // Logic
            player.y += player.dy;
            if (player.y < player.ground) player.dy += 0.6;
            else { player.y = player.ground; player.dy = 0; player.jumping = false; }

            obstacle.x -= obstacle.speed;
            if (obstacle.x < -30) {
                obstacle.x = 650;
                score++;
                obstacle.speed += 0.2;
                if (score > highScore) {
                    highScore = score;
                    localStorage.setItem("batmanHighScore", highScore);
                }
                scoreDisplay.innerHTML = `SCORE: ${score} | BEST: ${highScore}`;
                playSound(400, "sine", 0.1);
            }

            if (player.x < obstacle.x + obstacle.w && player.x + player.w > obstacle.x &&
                player.y < obstacle.y + obstacle.h && player.y + player.h > obstacle.y) {
                isGameOver = true;
                playSound(100, "square", 0.3);
                document.getElementById("gameOverScreen").style.display = "block";
            }

            requestAnimationFrame(draw);
        }

        function jump() {
            if (gameActive && !player.jumping && !isGameOver) {
                player.dy = player.jump;
                player.jumping = true;
                playSound(600, "sine", 0.1);
            }
        }

        window.addEventListener("keydown", (e) => { if (e.code === "Space") jump(); });
        canvas.addEventListener("touchstart", (e) => { e.preventDefault(); jump(); });
        initBuildings();
        scoreDisplay.innerHTML = `SCORE: 0 | BEST: ${highScore}`;
    </script>
</body>
</html>
