<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Batman Jump - Fixed Share</title>
    <style>
        body { text-align: center; background: #1a1a1a; color: white; font-family: 'Arial', sans-serif; margin: 0; overflow: hidden; touch-action: none; }
        #gameContainer { width: 100vw; height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; position: relative; }
        #game-title { position: absolute; top: 20px; width: 100%; text-align: center; font-family: 'Courier New', Courier, monospace; font-size: 30px; font-weight: bold; color: #ff0; text-shadow: 2px 2px #000; z-index: 10; }
        canvas { background: #222; border: 4px solid #f1c40f; width: 95%; max-width: 600px; border-radius: 8px; }
        #liveScore { margin-bottom: 10px; color: #f1c40f; font-weight: bold; font-size: 22px; text-shadow: 2px 2px #000; }
        .overlay { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(0,0,0,0.95); padding: 25px; border: 2px solid #f1c40f; border-radius: 12px; z-index: 20; min-width: 260px; }
        h1 { color: #f1c40f; margin: 0 0 10px 0; font-size: 28px; }
        .share-box { display: flex; flex-direction: column; gap: 8px; margin: 15px 0; }
        .btn { padding: 12px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; color: white; text-decoration: none; font-size: 14px; }
        .fb { background: #1877F2; }
        .x { background: #000; border: 1px solid #555; }
        .insta { background: linear-gradient(45deg, #f09433, #dc2743, #bc1888); }
        .retry { background: #ff0; color: #000; margin-top: 10px; font-size: 16px; }
    </style>
</head>
<body>
    <div id="gameContainer">
        <div id="game-title">BATMAN JUMP</div>
        <div id="liveScore">SCORE: 0 | BEST: 0</div>
        <canvas id="gameCanvas" width="600" height="250"></canvas>
        
        <div id="startScreen" class="overlay">
            <h1>BATMAN JUMP</h1>
            <p>TAP OR SPACE TO START</p>
        </div>

        <div id="gameOverScreen" class="overlay" style="display: none;">
            <h1>GOTHAM FELL!</h1>
            <p id="finalScore" style="font-size: 22px;"></p>
            <div class="share-box">
                <button class="btn fb" onclick="share('fb')">Share on Facebook</button>
                <button class="btn x" onclick="share('x')">Share on X (Twitter)</button>
                <button class="btn insta" onclick="share('insta')">Copy for Instagram</button>
            </div>
            <button class="btn retry" onclick="handleAction()">RETRY (SPACE)</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const scoreDisplay = document.getElementById("liveScore");
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        let gameActive = false, isGameOver = false, score = 0;
        let highScore = localStorage.getItem("batmanHighScore") || 0;
        const batmanImg = new Image();
        batmanImg.src = 'https://img.icons8.com/color/96/batman.png';

        let player = { x: 50, y: 180, w: 45, h: 45, dy: 0, jump: -11.5, ground: 180, jumping: false };
        let obstacle = { x: 750, y: 205, w: 25, h: 35, speed: 5.5 };
        let buildings = [];

        function initBuildings() {
            buildings = [];
            for(let i=0; i<1200; i+=120) {
                buildings.push({x: i, h: 60 + Math.random() * 80, light: Math.random() < 0.3});
            }
        }

        function playSound(freq, type, duration, vol=0.05) {
            try {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = type; osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
                gain.gain.setValueAtTime(vol, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
                osc.connect(gain); gain.connect(audioCtx.destination);
                osc.start(); osc.stop(audioCtx.currentTime + duration);
            } catch(e) {}
        }

        function handleAction() {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            if (!gameActive && !isGameOver) {
                document.getElementById("startScreen").style.display = "none";
                gameActive = true; resetGame(); requestAnimationFrame(draw);
            } else if (isGameOver) {
                resetGame(); document.getElementById("gameOverScreen").style.display = "none"; requestAnimationFrame(draw);
            } else if (gameActive && !player.jumping) {
                player.dy = player.jump; player.jumping = true; playSound(500, "sine", 0.1);
            }
        }

        function resetGame() {
            score = 0; obstacle.x = 800; obstacle.speed = 5.5;
            player.y = player.ground; isGameOver = false;
            initBuildings(); updateScoreText();
        }

        function updateScoreText() {
            scoreDisplay.innerHTML = `SCORE: ${score} | BEST: ${highScore}`;
        }

        function share(platform) {
            // აი აქ არის სწორი ლინკი:
            const gameUrl = "https://avtandil44.itch.io/batman-cube-jumper";
            const text = `I just scored ${score} in Batman Jump! Can you beat me? 🦇🔥`;
            
            if (platform === 'fb') {
                window.open(`https://www.facebook.com/sharer/sharer.php?u=${encodeURIComponent(gameUrl)}&quote=${encodeURIComponent(text)}`, '_blank');
            } else if (platform === 'x') {
                window.open(`https://twitter.com/intent/tweet?text=${encodeURIComponent(text)}&url=${encodeURIComponent(gameUrl)}`, '_blank');
            } else if (platform === 'insta') {
                navigator.clipboard.writeText(`${text} Play here: ${gameUrl}`);
                alert("ლინკი და ტექსტი დაკოპირდა! ჩასვი Instagram-ზე.");
            }
        }

        function draw() {
            if (isGameOver || !gameActive) return;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            buildings.forEach(b => {
                ctx.fillStyle = "#333";
                ctx.fillRect(b.x, 240 - b.h, 80, b.h);
                if(b.light) { ctx.fillStyle = "#f1c40f"; ctx.fillRect(b.x + 35, 240 - b.h + 20, 10, 10); }
                b.x -= 1.5; if(b.x < -120) b.x = 800;
            });
            ctx.fillStyle = "#f1c40f";
            ctx.fillRect(0, 240, 600, 10);
            ctx.drawImage(batmanImg, player.x, player.y, player.w, player.h);
            ctx.fillStyle = "#000"; ctx.fillRect(obstacle.x, obstacle.y, obstacle.w, obstacle.h);
            ctx.strokeStyle = "#fff"; ctx.strokeRect(obstacle.x, obstacle.y, obstacle.w, obstacle.h);
            player.y += player.dy;
            if (player.y < player.ground) player.dy += 0.65;
            else { player.y = player.ground; player.dy = 0; player.jumping = false; }
            obstacle.x -= obstacle.speed;
            if (obstacle.x < -obstacle.w) {
                obstacle.x = 800; score++; obstacle.speed += 0.18;
                if (score > highScore) { highScore = score; localStorage.setItem("batmanHighScore", highScore); }
                updateScoreText();
            }
            if (player.x < obstacle.x + obstacle.w && player.x + player.w > obstacle.x &&
                player.y < obstacle.y + obstacle.h && player.y + player.h > obstacle.y) {
                isGameOver = true; playSound(150, "square", 0.3, 0.1);
                document.getElementById("finalScore").innerText = "SCORE: " + score;
                document.getElementById("gameOverScreen").style.display = "block";
            } else { requestAnimationFrame(draw); }
        }

        window.addEventListener("keydown", (e) => { if (e.code === "Space") { e.preventDefault(); handleAction(); } });
        window.addEventListener("touchstart", (e) => { e.preventDefault(); handleAction(); }, {passive: false});
        initBuildings();
        updateScoreText();
    </script>
</body>
</html>
