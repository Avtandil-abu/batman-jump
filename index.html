<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Batman Jump</title>
    <style>
        body { margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; background-color: #1a1a1a; overflow: hidden; font-family: Arial, sans-serif; }
        #game-container { position: relative; width: 400px; height: 700px; background: #000; border: 2px solid #333; }
        #game-title { position: absolute; top: 20px; width: 100%; text-align: center; font-size: 30px; font-weight: bold; color: #ff0; text-shadow: 2px 2px #000; z-index: 10; }
        canvas { width: 100%; height: 100%; display: block; }
        #ui { position: absolute; top: 70px; left: 20px; color: white; font-size: 18px; z-index: 10; }
        #share-container { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); display: none; flex-direction: column; align-items: center; background: rgba(0,0,0,0.8); padding: 20px; border-radius: 10px; border: 1px solid #ff0; z-index: 20; width: 80%; }
        .share-btn { width: 100%; margin: 5px 0; padding: 10px; border: none; border-radius: 5px; cursor: pointer; color: white; font-weight: bold; }
        .fb { background: #1877F2; }
        .x { background: #000; border: 1px solid #fff; }
        .insta { background: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888); }
        .restart-btn { background: #ff0; color: #000; margin-top: 10px; padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
    <div id="game-container">
        <div id="game-title">BATMAN JUMP</div>
        <div id="ui">Score: <span id="score">0</span><br>Best: <span id="best">0</span></div>
        
        <div id="share-container">
            <h2 style="color: #ff0; margin-top: 0;">GAME OVER!</h2>
            <p style="color: #fff;">Share your score:</p>
            <button class="share-btn fb" onclick="share('fb')">Share on Facebook</button>
            <button class="share-btn x" onclick="share('x')">Share on X (Twitter)</button>
            <button class="share-btn insta" onclick="share('insta')">Copy for Instagram</button>
            <button class="restart-btn" onclick="resetGame()">PLAY AGAIN</button>
        </div>
        
        <canvas id="gameCanvas"></canvas>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        canvas.width = 400;
        canvas.height = 700;

        let score = 0;
        let record = localStorage.getItem('batmanBest') || 0;
        document.getElementById('best').innerText = record;

        // თამაშის ლოგიკის ცვლადები (შემოკლებით)
        let isGameOver = false;

        function showGameOver() {
            isGameOver = true;
            if (score > record) {
                record = score;
                localStorage.setItem('batmanBest', record);
                document.getElementById('best').innerText = record;
            }
            document.getElementById('share-container').style.display = 'flex';
        }

        function resetGame() {
            score = 0;
            document.getElementById('score').innerText = '0';
            document.getElementById('share-container').style.display = 'none';
            isGameOver = false;
            // აქ შენი თამაშის რესტარტის კოდი...
            location.reload(); // ყველაზე მარტივი გზა რესტარტისთვის
        }

        function share(platform) {
            const url = encodeURIComponent("https://avtandil44.itch.io/batman-jump");
            const text = encodeURIComponent(`I just scored ${score} points in Batman Jump! Can you beat my record? 🦇🔥`);
            
            if (platform === 'fb') {
                window.open(`https://www.facebook.com/sharer/sharer.php?u=${url}&quote=${text}`, '_blank');
            } else if (platform === 'x') {
                window.open(`https://twitter.com/intent/tweet?text=${text}&url=${url}`, '_blank');
            } else if (platform === 'insta') {
                navigator.clipboard.writeText(`${text} Play here: ${decodeURIComponent(url)}`);
                alert("Text copied! Now you can paste it in your Instagram Story/Bio.");
            }
        }

        // დროებითი "სამაიმუნო" კოდი, რომ დატესტო (დააჭირე ეკრანს და ქულა მოიმატებს, 5 წამში წააგებ)
        canvas.addEventListener('click', () => {
            if(!isGameOver) {
                score++;
                document.getElementById('score').innerText = score;
            }
        });
        setTimeout(showGameOver, 5000); // ტესტისთვის 5 წამში აჩვენებს Game Over-ს
    </script>
</body>
</html>
