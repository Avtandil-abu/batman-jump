<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Batman Jump - RNG Edition</title>
    <style>
        body { text-align: center; background: #000; color: white; font-family: 'Arial', sans-serif; margin: 0; overflow: hidden; touch-action: none; }
        #gameContainer { width: 100vw; height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; position: relative; }
        canvas { background: #1a1a1a; border-top: 4px solid #f1c40f; border-bottom: 4px solid #f1c40f; width: 100%; max-width: 600px; }
        .ui-text { position: absolute; text-align: center; width: 100%; pointer-events: none; z-index: 10; }
        #liveScore { top: 20px; color: #f1c40f; font-weight: bold; font-size: 22px; }
        .overlay { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(0,0,0,0.9); padding: 25px; border-radius: 10px; border: 2px solid #f1c40f; min-width: 250px; }
        h1 { color: #f1c40f; margin: 0; }
        .hint { color: #3498db; font-size: 13px; margin-top: 10px; }
    </style>
</head>
<body>
    <div id="gameContainer">
        <div id="liveScore" class="ui-text">SCORE: 0 | BEST: 0</div>
        <canvas id="gameCanvas" width="600" height="250"></canvas>
        
        <div id="startScreen" class="overlay">
            <h1>BATMAN JUMP</h1>
            <p>SPACE TO START</p>
            <p class="hint">BLUE STAR APPEARS RANDOMLY!</p>
        </div>

        <div id="gameOverScreen" class="overlay" style="display: none;">
            <h1>GOTHAM FELL!</h1>
            <p id="finalScore"></p>
            <p style="color: #f1c40f; font-weight: bold;">SPACE TO RETRY</p>
        </div>
    </div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const scoreDisplay = document.getElementById("liveScore");
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        let gameActive = false, isGameOver = false, score = 0;
        let highScore = localStorage.getItem("batmanHighScore") || 0;
        
        const batmanImg = new Image();
        batmanImg.src = 'https://img.icons8.com/color/96/batman.png';

        let player = { x: 50, y: 180, w: 50, h: 50, dy: 0, jump: -12, ground: 180, jumping: false };
        let obstacle = { x: 700, y: 200, w: 30, h: 30, speed: 5 };
        let powerUp = { x: -100, y: 100, active: false };
        let buildings = [];

        function initBuildings() {
            buildings = [];
            for(let i=0; i<800; i+=80) {
                buildings.push({x: i, h: 50 + Math.random() * 100, light: Math.random() < 0.3});
            }
        }

        function playSound(freq, type, duration, vol=0.05) {
            try {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = type;
                osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
                gain.gain.setValueAtTime(vol, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
                osc.connect(gain); gain.connect(audioCtx.destination);
                osc.start(); osc.stop(audioCtx.currentTime + duration);
            } catch(e) {}
        }

        function handleAction() {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            if (!gameActive && !isGameOver) {
                document.getElementById("startScreen").style.display = "none";
                gameActive = true;
                resetGameValues();
                requestAnimationFrame(draw);
            } else if (isGameOver) {
                resetGameValues();
                document.getElementById("gameOverScreen").style.display = "none";
                requestAnimationFrame(draw);
            } else if (gameActive && !player.jumping) {
                player.dy = player.jump;
                player.jumping = true;
                playSound(500, "sine", 0.1);
            }
        }

        function resetGameValues() {
            score = 0;
            obstacle.x = 700;
            obstacle.speed = 5.5; // ცოტა უფრო სწრაფი დასაწყისი
            player.y = player.ground;
            powerUp.active = false;
            isGameOver = false;
            scoreDisplay.innerHTML = `SCORE: 0 | BEST: ${highScore}`;
            initBuildings();
        }

        function draw() {
            if (isGameOver || !gameActive) return;

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            buildings.forEach(b => {
                ctx.fillStyle = "#111";
                ctx.fillRect(b.x, 240 - b.h, 60, b.h);
                if(b.light) { ctx.fillStyle = "#f1c40f"; ctx.fillRect(b.x + 25, 240 - b.h + 15, 8, 8); }
            });
            ctx.fillStyle = "#f1c40f";
            ctx.fillRect(0, 240, 600, 10);

            ctx.drawImage(batmanImg, player.x, player.y, player.w, player.h);
            
            ctx.fillStyle = "black";
            ctx.fillRect(obstacle.x, obstacle.y, obstacle.w, obstacle.h);
            ctx.strokeStyle = "white";
            ctx.strokeRect(obstacle.x, obstacle.y, obstacle.w, obstacle.h);

            // Power-Up Logic (Random Spawn)
            if (powerUp.active) {
                ctx.fillStyle = "#3498db";
                ctx.beginPath();
                ctx.arc(powerUp.x, powerUp.y, 10, 0, Math.PI * 2);
                ctx.fill();
                powerUp.x -= obstacle.speed;
                
                if (player.x < powerUp.x + 15 && player.x + player.w > powerUp.x - 15 &&
                    player.y < powerUp.y + 15 && player.y + player.h > powerUp.y - 15) {
                    powerUp.active = false;
                    obstacle.speed = Math.max(5.5, obstacle.speed - 1.5); // შენელება
                    playSound(900, "sine", 0.2, 0.1);
                }
                if (powerUp.x < -20) powerUp.active = false;
            }

            player.y += player.dy;
            if (player.y < player.ground) player.dy += 0.6;
            else { player.y = player.ground; player.dy = 0; player.jumping = false; }

            obstacle.x -= obstacle.speed;
            if (obstacle.x < -30) {
                obstacle.x = 750;
                score++;
                obstacle.speed += 0.22; // უფრო აგრესიული აჩქარება
                
                // 20% შანსი ყოველ ქულაზე
                if (Math.random() < 0.20 && !powerUp.active && score > 5) {
                    powerUp.x = 750;
                    powerUp.y = 70 + Math.random() * 60; // ცვლადი სიმაღლე
                    powerUp.active = true;
                }

                if (score > highScore) {
                    highScore = score;
                    localStorage.setItem("batmanHighScore", highScore);
                }
                scoreDisplay.innerHTML = `SCORE: ${score} | BEST: ${highScore}`;
            }

            if (player.x < obstacle.x + obstacle.w && player.x + player.w > obstacle.x &&
                player.y < obstacle.y + obstacle.h && player.y + player.h > obstacle.y) {
                isGameOver = true;
                playSound(150, "square", 0.3);
                document.getElementById("finalScore").innerText = "YOUR SCORE: " + score;
                document.getElementById("gameOverScreen").style.display = "block";
            } else {
                requestAnimationFrame(draw);
            }
        }

        window.addEventListener("keydown", (e) => { if (e.code === "Space") { e.preventDefault(); handleAction(); } });
        window.addEventListener("touchstart", (e) => { e.preventDefault(); handleAction(); }, {passive: false});
        initBuildings();
        scoreDisplay.innerHTML = `SCORE: 0 | BEST: ${highScore}`;
    </script>
</body>
</html>
